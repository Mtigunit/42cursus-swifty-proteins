<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ligand 3D Viewer</title>
    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0D1B2A;
        }
        
        #viewer-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            text-align: center;
        }
        
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            text-align: center;
            padding: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="viewer-container">
        <div id="loading">Loading molecule...</div>
        <div id="error"></div>
    </div>

    <script>
        // Initialize 3Dmol viewer
        let viewer;
        let element = document.getElementById('viewer-container');
        // Dark blue background with smooth rendering and no distance blur for optimal molecular visualization
        let config = { 
            backgroundColor: '#0D1B2A',
            antialias: true,
            disableFog: true
        };
        // 3Dmol.js creates a WebGL canvas
        viewer = $3Dmol.createViewer(element, config);
        window.viewer = viewer;
        
        // Function to load and display molecule
        function loadMolecule(sdfUrl) {
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            
            fetch(sdfUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.text();
                })
                .then(sdfData => {
                    // Clear any existing models
                    viewer.clear();
                    
                    // Add the model from SDF data
                    viewer.addModel(sdfData, "sdf");
                    
                    // Set style - ball and stick representation
                    
                    
                    viewer.setStyle(
                        // Empty object = Apply style to ALL atoms in the molecule
                        {}, 
                        // This defines TWO visual representations simultaneously (ball-and-stick model):
                        {
                        stick: {
                            radius: 0.15,
                            colorscheme: 'Jmol'
                        },
                        sphere: {
                            radius: 0.4,
                            colorscheme: 'Jmol'
                        }
                    });
                    
                    // Center and zoom to fit the molecule
                    viewer.zoomTo();
                    viewer.zoom(1.2);
                    
                    // Render the scene
                    viewer.render();
                    
                    // Hide loading indicator
                    loadingDiv.style.display = 'none';
                    
                    // Enable rotation
                    viewer.rotate(10, {x:1, y:1, z:0});
                })
                .catch(error => {
                    console.error('Error loading molecule:', error);
                    loadingDiv.style.display = 'none';
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = 'Failed to load molecule\n' + error.message;
                });
        }
        
        // Function to change visualization style
        function setStyle(styleName) {
            if (!viewer) return;
            
            viewer.setStyle({}, getStyleConfig(styleName));
            viewer.render();
        }
        
        function getStyleConfig(styleName) {
            const styles = {
                'stick': {
                    stick: {
                        radius: 0.15,
                        colorscheme: 'Jmol'
                    }
                },
                'sphere': {
                    sphere: {
                        radius: 1.0,
                        colorscheme: 'Jmol'
                    }
                },
                'ballStick': {
                    stick: {
                        radius: 0.15,
                        colorscheme: 'Jmol'
                    },
                    sphere: {
                        radius: 0.4,
                        colorscheme: 'Jmol'
                    }
                },
                'cartoon': {
                    cartoon: {
                        color: 'spectrum'
                    }
                },
                'line': {
                    line: {
                        colorscheme: 'Jmol'
                    }
                }
            };
            
            return styles[styleName] || styles['ballStick'];
        }
    </script>
</body>
</html>
