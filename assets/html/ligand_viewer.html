<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ligand 3D Viewer</title>
    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; }
        #viewer-container { width: 100%; height: 100%; position: relative; }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            text-align: center;
        }
        #error {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            text-align: center;
            padding: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="viewer-container">
        <div id="loading">Loading molecule...</div>
        <div id="error"></div>
    </div>

    <script>
        let backgroundColorHex = '#0D1B2A';
        window.setBackgroundColor = function(color) {
            backgroundColorHex = color;
            document.body.style.backgroundColor = color;
            if (viewer) {
                viewer.setBackgroundColor(color);
                viewer.render();
            }
        };

        window.setLigandData = function(url) {
            window.ligandUrl = url;
            loadMolecule(url);
        };

        window.ensureMoleculeLoaded = function() {
            if (!window.viewer || !window.ligandUrl) return;
            const model = window.viewer.getModel();
            if (!model) {
                loadMolecule(window.ligandUrl);
            }
        };

        window.cpkColors = {
            prop: "elem",
            map: { C: 0x333333 }
        };

        let viewer = $3Dmol.createViewer(
            document.getElementById('viewer-container'),
            { backgroundColor: backgroundColorHex, antialias: true, disableFog: true }
        );
        window.viewer = viewer;

        if (window.ResizeObserver) {
            new ResizeObserver(function() {
                window.viewer.zoomTo();;
                viewer.render();
            }).observe(document.getElementById('viewer-container'));
        }

        function loadMolecule(sdfUrl) {
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');

            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';

            fetch(sdfUrl)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return response.text();
                })
                .then(sdfData => {
                    viewer.clear();
                    viewer.addModel(sdfData, "sdf");

                    const model = viewer.getModel();
                    if (model && window.FlutterChannel) {
                        const atoms = model.selectedAtoms({});
                        const counts = {};
                        atoms.forEach(atom => {
                            const elem = (atom.elem || '').trim();
                            if (elem) counts[elem] = (counts[elem] || 0) + 1;
                        });
                        window.FlutterChannel.postMessage(JSON.stringify({
                            type: 'ligandSummary',
                            atomCount: atoms.length,
                            formula: buildFormula(counts)
                        }));
                    }

                    setStyle('ballStick');

                    viewer.setClickable({}, true, function(atom) {
                        if (window.FlutterChannel) {
                            window.FlutterChannel.postMessage(JSON.stringify({
                                elem: atom.elem,
                                serial: atom.serial,
                                color: atom.color,
                                name: atom.name || atom.elem,
                                resi: atom.resi || '',
                                resn: atom.resn || '',
                                x: (atom.x || 0).toFixed(2),
                                y: (atom.y || 0).toFixed(2),
                                z: (atom.z || 0).toFixed(2)
                            }));
                        }
                    });

                    viewer.canvas.addEventListener('click', function(event) {
                        const rect = viewer.canvas.getBoundingClientRect();
                        const picked = viewer.pick({
                            x: event.clientX - rect.left,
                            y: event.clientY - rect.top
                        });
                        if ((!picked || !picked.atom) && window.FlutterChannel) {
                            window.FlutterChannel.postMessage(JSON.stringify({ hideTooltip: true }));
                        }
                    });
                    loadingDiv.style.display = 'none';
                    viewer.rotate(10, { x: 1, y: 1, z: 0 });
                })
                .catch(error => {
                    loadingDiv.style.display = 'none';
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = 'Failed to load molecule\n' + error.message;
                });
        }

        function setStyle(styleName) {
            if (!viewer) return;
            viewer.setStyle({}, getStyleConfig(styleName));
            viewer.render();
        }

        function getStyleConfig(styleName) {
            const styles = {
                stick:    { stick:  { radius: 0.15, colorscheme: window.cpkColors } },
                sphere:   { sphere: { radius: 1.0,  colorscheme: window.cpkColors } },
                ballStick: {
                    stick:  { radius: 0.15, colorscheme: window.cpkColors },
                    sphere: { radius: 0.3,  colorscheme: window.cpkColors }
                },
                line:     { line: { colorscheme: window.cpkColors } }
            };
            return styles[styleName] || styles['ballStick'];
        }

        // Hill notation ===> Carbon first → Hydrogen second → everything else alphabetically
        function buildFormula(counts) {
            const parts = [];
            if (counts.C) parts.push('C' + (counts.C > 1 ? counts.C : ''));
            if (counts.H) parts.push('H' + (counts.H > 1 ? counts.H : ''));
            Object.keys(counts)
                .filter(e => e !== 'C' && e !== 'H')
                .sort()
                .forEach(e => parts.push(e + (counts[e] > 1 ? counts[e] : '')));
            return parts.length ? parts.join('') : 'Unknown';
        }

        window.getPngDataUrl = function() {
            return window.viewer ? window.viewer.pngURI() : null;
        };
    </script>
</body>
</html>
